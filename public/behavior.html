<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Behavior Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  box-sizing: border-box;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px 16px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
  color: #312e81;
  font-weight: 500;
  text-align: center;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
  font-weight: bold;
}

.main {
  flex: 1;
  padding: 20px;
  max-width: 800px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-top: 14px;
  border: 1px solid rgba(0,0,0,0.05);
}

.section-title {
  font-weight: bold;
  margin-top: 20px;
}

.error {
  text-align: center;
  margin-top: 40px;
  color: red;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item active">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Behavior Report</h2>
  <div id="content"></div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";

const token = localStorage.getItem("ads_token");

if (!token || token === "null" || token === "undefined") {
  window.location.href = "login.html";
  throw new Error("STOP");
}

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    // ✅ SAFE HANDLING (KEY FIX)
    if (!data || !data.behaviorReport) {
      container.innerHTML = `
        <div class="card">
          Behavior data is not available yet.<br><br>
          Start evaluating more decisions to generate insights.
        </div>
      `;
      return;
    }

    const b = data.behaviorReport;

    let html = `
      <div class="card"><strong>Decision Profile</strong><br>${b.decisionProfile}</div>
      <div class="card"><strong>Coaching Summary</strong><br>${b.coachingSummary}</div>
    `;

    container.innerHTML = html;

  } catch (err) {
    console.error(err);
    container.innerHTML = "<div class='error'>Failed to load</div>";
  }
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
