<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings - OutcomeClarity</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 340px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

.section {
  margin-top: 20px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}

.secondary {
  background: #e5e7eb;
  color: #111;
}

.secondary:hover {
  background: #d1d5db;
}

.link-btn {
  background: transparent;
  border: 1px solid #d1d5db;
  color: #374151;
}

.link-btn:hover {
  background: #f3f4f6;
}
</style>
</head>

<body>

<div class="card">

  <h1>Settings</h1>
  <p>Your account is active.</p>

  <!-- PRIMARY ACTIONS -->
  <div class="section">
    <button onclick="goToDashboard()">Go to Dashboard</button>
    <button class="secondary" onclick="logout()">Logout</button>
  </div>

  <!-- INFORMATION LINKS -->
  <div class="section">
    <button class="link-btn" onclick="goAbout()">About</button>
    <button class="link-btn" onclick="goDisclaimer()">Disclaimer</button>
    <button class="link-btn" onclick="goFAQ()">FAQ</button>
  </div>

</div>

<script>

/* 🔒 AUTH PROTECTION */
if (!localStorage.getItem("ads_token")) {
  window.location.href = "/onboard.html";
}

/* NAVIGATION */
function goToDashboard() {
  window.location.href = "/dashboard.html";
}

function goAbout() {
  window.location.href = "/about.html";
}

function goDisclaimer() {
  window.location.href = "/disclaimer.html";
}

function goFAQ() {
  window.location.href = "/faq.html";
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("ads_token");
  window.location.href = "/onboard.html";
}

</script>

</body>
</html>
