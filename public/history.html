<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS History</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; display: flex; }
.sidebar { width: 220px; background: #e0e7ff; height: 100vh; padding: 20px 10px; border-right: 1px solid #c7d2fe; display: flex; flex-direction: column; justify-content: center; }
.nav-item { padding: 14px 16px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; color: #312e81; text-align: center; }
.nav-item:hover { background: #c7d2fe; }
.active { background: #4338ca; color: white; font-weight: bold; }
.main { flex: 1; padding: 20px; max-width: 800px; margin: auto; }
.card { background: white; border-radius: 12px; padding: 14px; margin-top: 14px; border: 1px solid rgba(0,0,0,0.05); }
.section-title { font-weight: bold; margin-top: 20px; font-size: 16px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.metric { background: #c7d2fe; padding: 12px; border-radius: 10px; text-align: center; }
.metric-title { font-size: 12px; color: #555; }
.metric-value { font-size: 20px; font-weight: bold; }
.notice { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 14px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; }
.btn { margin-top: 10px; padding: 10px 14px; background: #4338ca; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.error { text-align: center; margin-top: 40px; color: red; }
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Decisions</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item active">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>History</h2>
  <div id="content"></div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";

function token() {
  return localStorage.getItem("ads_token");
}

const t = token();
if (!t || t === "null" || t === "undefined") {
  window.location.href = "login.html";
  throw new Error("STOP");
}

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {
    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + t }
    });

    const data = await res.json();

    // 🔴 SAFE parsing (no crashing)
    const total = data?.totalDecisions ?? 0;
    const evaluated = data?.evaluatedDecisions ?? 0;

    const evalRate = total > 0
      ? Math.round((evaluated / total) * 100)
      : 0;

    const avgScore = Math.round(data?.averageRegretScore ?? 0);

    const topCategory = "Tracked in Insights";

    let notice = "";

    if (evaluated < 3) {
      notice = `<div class="notice">Your data is still very limited. Evaluate more decisions.</div>`;
    } else if (evaluated < 8) {
      notice = `<div class="notice">These insights are still stabilizing.</div>`;
    }

    container.innerHTML = `
      ${notice}

      <div class="section-title">Overview</div>

      <div class="grid">
        <div class="metric"><div class="metric-title">Total Decisions</div><div class="metric-value">${total}</div></div>
        <div class="metric"><div class="metric-title">Evaluated</div><div class="metric-value">${evaluated}</div></div>
        <div class="metric"><div class="metric-title">Evaluation Rate</div><div class="metric-value">${evalRate}%</div></div>
        <div class="metric"><div class="metric-title">Average Satisfaction</div><div class="metric-value">${avgScore}/10</div></div>
        <div class="metric"><div class="metric-title">Pending</div><div class="metric-value">${total - evaluated}</div></div>
        <div class="metric"><div class="metric-title">Most Used Category</div><div class="metric-value">${topCategory}</div></div>
      </div>

      <div class="card">
        <strong>Tips & Coaching</strong><br>
        Review your personalized coaching insights.<br>
        <button class="btn" onclick="goBehavior()">View Tips & Coaching</button>
      </div>
    `;

  } catch (err) {
    container.innerHTML = "<div class='error'>Unable to load history</div>";
  }
}

function goDash() { window.location.href = "dashboard.html"; }
function goEvaluations() { window.location.href = "evaluations.html"; }
function goInsights() { window.location.href = "insights.html"; }
function goSettings() { window.location.href = "settings.html"; }
function goBehavior() { window.location.href = "behavior.html"; }

load();

</script>

</body>
</html>
