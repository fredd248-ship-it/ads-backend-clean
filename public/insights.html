<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Insights</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef6fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 20px;
  max-width: 800px;
  margin: auto;
}

/* CARDS */

.card {
  margin-top: 12px;
  padding: 14px;
  border-radius: 12px;
  border-left: 5px solid;
  background: white;
}

.low { border-color: #4caf50; }
.medium { border-color: #ff9800; }
.high { border-color: #f44336; }

.title {
  font-weight: bold;
  margin-bottom: 6px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item active">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Insights</h2>
  <div id="content"></div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

function severityClass(text) {
  if (!text) return "low";

  const t = text.toLowerCase();

  if (t.includes("inconsistent") || t.includes("improve")) return "high";
  if (t.includes("moderate")) return "medium";

  return "low";
}

function card(title, text, severity="low") {
  return `
    <div class="card ${severity}">
      <div class="title">${title}</div>
      ${text}
    </div>
  `;
}

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    const total = data.totalDecisions || 0;
    const evaluated = data.evaluatedDecisions || 0;
    const followThrough = data.followThroughRate || 0;

    const rate = total > 0
      ? Math.round((evaluated / total) * 100)
      : 0;

    let html = "";

    html += card(
      "Evaluation Rate",
      `${rate}% of your decisions have been evaluated`
    );

    html += card(
      "Follow-Through Rate",
      `${followThrough}% would be made again`
    );

    if (data.primaryPattern) {
      html += card(
        "Primary Pattern",
        data.primaryPattern,
        severityClass(data.primaryPattern)
      );
    }

    if (data.stability) {
      html += card(
        "Stability",
        data.stability,
        severityClass(data.stability)
      );
    }

    if (data.recommendedFocus) {
      html += card(
        "Recommended Focus",
        data.recommendedFocus,
        severityClass(data.recommendedFocus)
      );
    }

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = "<div>Failed to load</div>";
  }
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
