<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
}

.container {
  padding: 20px;
}

button {
  padding: 10px;
  background: #4f46e5;
  color: white;
  border: none;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 10% auto;
  width: 300px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Dashboard</h2>

  <button onclick="openModal()">+ New Decision</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h3>Create Decision</h3>

    <input id="title" placeholder="Decision title"><br><br>

    <!-- ✅ CATEGORY DROPDOWN -->
    <select id="category"></select><br><br>

    <button onclick="saveDecision()">Save</button>
    <button onclick="closeModal()">Cancel</button>

  </div>
</div>

<script>
/* 🔒 AUTH GUARD */
const token = localStorage.getItem("ads_token");
if (!token) {
  window.location.href = "login.html";
}

/* MODAL CONTROL */
function openModal() {
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* ✅ CATEGORY LIST (from your categories page) */
const categories = [
  "Home Office",
  "Travel",
  "Relationship",
  "Job",
  "Lawn and Garden",
  "Electronics",
  "Home",
  "Outdoors and Patio",
  "Vehicle",
  "Moving",
  "Work",
  "Business",
  "Tools",
  "Clothing",
  "Decor",
  "Dining",
  "Medical",
  "Pets",
  "Other"
];

/* ✅ POPULATE DROPDOWN */
function populateCategories() {
  const select = document.getElementById("category");

  select.innerHTML = "";

  categories.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

/* 🔥 RUN ON LOAD */
populateCategories();

/* SAVE DECISION (UNCHANGED CORE FLOW) */
async function saveDecision() {
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;

  try {
    await fetch("https://ads-backend-clean.onrender.com/api/v1/decisions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        title,
        category
      })
    });

    closeModal();
    location.reload();

  } catch (err) {
    alert("Error saving decision");
  }
}
</script>

</body>
</html>
