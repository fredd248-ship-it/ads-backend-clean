<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

/* FAB SECTION (moved upward) */
.create-section {
  margin-top: 40px;
  text-align: center;
}

.create-label {
  font-size: 14px;
  margin-bottom: 8px;
  color: #312e81;
}

.create-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #4338ca;
  color: white;
  font-size: 24px;
  border: none;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  max-width: 800px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-top: 14px;
  border: 1px solid rgba(0,0,0,0.05);
  cursor: pointer;
}

/* MODAL BACKDROP */
#createModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, 0.55); /* darker overlay */
}

/* MODAL CARD */
.modal-content {
  background: #ffffff;
  width: 340px;
  margin: 120px auto;
  padding: 22px;
  border-radius: 14px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

/* INPUTS */
.modal-content input,
.modal-content select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* BUTTONS */
.modal-content button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}

.save-btn {
  background: #4338ca;
  color: white;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>

  <div class="create-section">
    <div class="create-label">New Decision</div>
    <button class="create-btn" onclick="openModal()">+</button>
  </div>
</div>

<div class="main">
  <h2>Decisions</h2>
  <div id="content">Loading...</div>
</div>

<!-- MODAL -->
<div id="createModal">
  <div class="modal-content">
    <h3>New Decision</h3>

    <input id="title" placeholder="Decision title">

    <select id="category">
      <option value="">Select Category</option>
      <option>Home Office</option>
      <option>Travel</option>
      <option>Relationship</option>
      <option>Job</option>
      <option>Lawn and Garden</option>
      <option>Electronics</option>
      <option>Home</option>
      <option>Outdoors and Patio</option>
      <option>Vehicle</option>
      <option>Moving</option>
      <option>Work</option>
      <option>Business</option>
      <option>Tools</option>
      <option>Clothing</option>
      <option>Decor</option>
    </select>

    <input id="cost" type="text" placeholder="Cost">

    <button class="save-btn" onclick="createDecision()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

if (!token) {
  window.location.href = "login.html";
  throw new Error("STOP");
}

async function load(){
  const res = await fetch(API + "/decisions", {
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  const content = document.getElementById("content");

  content.innerHTML = data.data.map(d => `
    <div class="card" onclick="goEvaluate('${d.id}')">
      <strong>${d.title}</strong><br>
      ${d.category || ""}
    </div>
  `).join("");
}

function goEvaluate(id){
  window.location.href = "evaluate.html?id=" + id;
}

function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

function openModal(){
  document.getElementById("createModal").style.display = "block";
}

function closeModal(){
  document.getElementById("createModal").style.display = "none";
}

async function createDecision(){
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const cost = parseFloat(document.getElementById("cost").value) || 0;

  await fetch(API + "/decisions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ title, category, cost })
  });

  closeModal();
  load();
}

load();

</script>

</body>
</html>
