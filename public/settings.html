<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fb;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #eef2ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #d1d5db;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #3730a3;
}

.nav-item:hover { background: #c7d2fe; }
.active { background: #4f46e5; color: white; }

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

/* CARD */
.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-top: 14px;
  border: 1px solid rgba(0,0,0,0.05);
}

.button {
  margin-top: 12px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #ef4444;
  color: white;
  cursor: pointer;
  width: 100%;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item active">Settings</div>
</div>

<div class="main">

<h2>Settings</h2>

<div class="card">
  <div><strong>Account</strong></div>
  <button class="button" onclick="logout()">Log Out</button>
</div>

</div>

<script>

/* 🔧 AUTH GUARD */
const token = localStorage.getItem("ads_token");
if (!token || token === "null" || token === "undefined") {
  window.location.href = "login.html";
  throw new Error("STOP");
}

/* 🔧 LOGOUT FIX */
function logout(){
  localStorage.removeItem("ads_token");
  window.location.href = "login.html";
}

/* 🔧 NAV FIX */
function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }

</script>

</body>
</html>
