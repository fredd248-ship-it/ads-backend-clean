<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 500px;
  padding: 20px;
}

h1 {
  margin-bottom: 16px;
}

p {
  color: #555;
  line-height: 1.5;
}

.button-group {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

button {
  padding: 14px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

.primary-btn {
  background: #4f46e5;
  color: white;
}

.secondary-btn {
  background: #e5e7eb;
  color: #111827;
}

button:hover {
  opacity: 0.95;
}
</style>
</head>

<body>

<div class="container">

  <h1>Welcome to Outcome Clarity</h1>

  <p>
    Track your decisions, evaluate outcomes, and uncover patterns in your behavior.
  </p>

  <div class="button-group">
    <button class="primary-btn" onclick="goRegister()">
      Create Account
    </button>

    <button class="secondary-btn" onclick="goLogin()">
      Log In
    </button>
  </div>

</div>

<script>

function goRegister(){
  window.location.href = "register.html";
}

function goLogin(){
  window.location.href = "login.html";
}

</script>

</body>
</html>
