<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter Invite - OutcomeClarity</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #4338ca;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Enter Beta Access</h2>

  <input id="code" placeholder="Invite Code" />
  <button onclick="submitCode()">Continue</button>

  <div id="error" class="error"></div>
</div>

<script>

async function submitCode() {
  const code = document.getElementById("code").value;

  try {
    const res = await fetch("/api/v1/invite/validate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code })
    });

    if (res.ok) {
      // ✅ STORE BOTH FLAGS
      localStorage.setItem("invite_valid", "true");
      localStorage.setItem("invite_code", code);

      window.location.href = "login.html";
    } else {
      document.getElementById("error").innerText = "Invalid invite code";
    }

  } catch (err) {
    document.getElementById("error").innerText = "Server error";
  }
}

</script>

</body>
</html>
