<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - OutcomeClarity</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #4f46e5;
  color: white;
  border: none;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Login</h1>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button onclick="login()">Login</button>

  <div id="error" class="error"></div>

  <p>
    Don’t have an account? <a href="register.html">Create one</a>
  </p>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const errorBox = document.getElementById("error");
  errorBox.innerText = "Processing...";

  try {
    const res = await fetch("https://ads-backend-clean.onrender.com/api/v1/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("ads_token", data.token);
      window.location.href = "dashboard.html";
    } else {
      errorBox.innerText = data.error || "Invalid email or password";
    }

  } catch (err) {
    errorBox.innerText = "Connection error";
  }
}
</script>

</body>
</html>
