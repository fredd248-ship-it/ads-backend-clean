<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
</head>
<body>

<h2>Create Account</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<input id="inviteToken" placeholder="Access Code"><br><br>

<button onclick="register()">Register</button>

<p id="error" style="color:red;"></p>

<script>
console.log("REGISTER PAGE LOADED");

async function register() {
  console.log("REGISTER BUTTON CLICKED");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const inviteToken = document.getElementById("inviteToken").value;

  console.log("FORM DATA:", email, password, inviteToken);

  try {
    const res = await fetch("/api/v1/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password,
        inviteToken
      })
    });

    console.log("REQUEST SENT");

    const data = await res.json();

    console.log("RESPONSE:", data);

    if (res.ok) {
      alert("Account created!");
      window.location.href = "login.html";
    } else {
      document.getElementById("error").innerText = data.error || "Registration failed";
    }

  } catch (err) {
    console.error("FETCH ERROR:", err);
    document.getElementById("error").innerText = "Server error";
  }
}
</script>

</body>
</html>
