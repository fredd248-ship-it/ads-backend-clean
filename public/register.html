<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 24px;
  border-radius: 12px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <h2>Create Account</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="inviteCode" placeholder="Access Code">

  <button id="registerBtn">Create Account</button>

  <div id="error" class="error"></div>

</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";

document.getElementById("registerBtn").addEventListener("click", async () => {

  const btn = document.getElementById("registerBtn");
  const errorDiv = document.getElementById("error");

  errorDiv.innerText = "";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const inviteCode = document.getElementById("inviteCode").value.trim();

  console.log("SENDING:", { email, inviteCode });

  if (!email || !password || !inviteCode) {
    errorDiv.innerText = "All fields are required";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Creating...";

  try {

    const res = await fetch(API + "/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password,
        inviteCode
      })
    });

    const data = await res.json();

    if (!res.ok) {
      errorDiv.innerText = data.error || "Registration failed";
      btn.disabled = false;
      btn.innerText = "Create Account";
      return;
    }

    localStorage.setItem("ads_token", data.token);
    window.location.href = "dashboard.html";

  } catch (err) {
    errorDiv.innerText = "Network error";
    btn.disabled = false;
    btn.innerText = "Create Account";
  }

});

</script>

</body>
</html>
