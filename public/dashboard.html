<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #eef2ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #d1d5db;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #3730a3;
}

.nav-item:hover { background: #c7d2fe; }
.active { background: #4f46e5; color: white; }

.main {
  flex: 1;
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-top: 14px;
  border: 1px solid rgba(0,0,0,0.05);
  cursor: pointer;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 500px;
  padding: 20px;
  border-radius: 12px;
}

.section { margin-top: 20px; }

input[type=range] { width: 100%; }

select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
}

.toggle {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.toggle button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #e5e7eb;
}

.toggle .active {
  background: #4f46e5;
  color: white;
}

.save {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 10px;
}

.close {
  margin-top: 10px;
  background: #aaa;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Decisions</h2>
  <div id="list"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div id="modalTitle"><strong>Evaluate</strong></div>

    <div class="section">
      <div><strong>Satisfaction (0–10)</strong></div>
      <input type="range" min="0" max="10" value="5" id="slider">
      <div id="sliderValue">5</div>
    </div>

    <div class="section">
      <div><strong>Frequency of Use</strong></div>
      <select id="frequency">
        <option>Low</option>
        <option selected>Medium</option>
        <option>High</option>
      </select>
    </div>

    <div class="section">
      <div><strong>Would you do / buy again?</strong></div>
      <div class="toggle">
        <button id="yesBtn" class="active" onclick="setAgain(true)">Yes</button>
        <button id="noBtn" onclick="setAgain(false)">No</button>
      </div>
    </div>

    <button class="save" id="saveBtn" onclick="save()">Save</button>
    <button class="save close" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";

function token(){
  return localStorage.getItem("ads_token");
}

const t = token();
if(!t){
  window.location.href="login.html";
}

let currentDecisionId = null;
let wouldBuyAgain = true;

async function load(){

  const res = await fetch(API + "/decisions", {
    headers:{ Authorization:"Bearer "+t }
  });

  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.data.forEach(d => {

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<strong>${d.title}</strong><br><small>${d.category}</small>`;

    card.onclick = () => openModal(d);

    container.appendChild(card);
  });
}

function openModal(decision){
  currentDecisionId = decision.id;
  document.getElementById("modalTitle").innerText = decision.title;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

const slider = document.getElementById("slider");
const sliderValue = document.getElementById("sliderValue");

slider.oninput = () => {
  sliderValue.innerText = slider.value;
};

function setAgain(val){
  wouldBuyAgain = val;
  document.getElementById("yesBtn").classList.toggle("active", val);
  document.getElementById("noBtn").classList.toggle("active", !val);
}

async function save(){

  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.innerText = "Saving...";

  const satisfaction = Number(slider.value);
  const regretScore = 10 - satisfaction;
  const frequencyOfUse = document.getElementById("frequency").value;

  try {

    const res = await fetch(API + "/decisions/" + currentDecisionId + "/evaluate", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+t
      },
      body: JSON.stringify({
        regretScore,
        frequencyOfUse,
        wouldBuyAgain
      })
    });

    if(!res.ok){
      throw new Error();
    }

    closeModal();
    load();

  } catch {
    alert("Failed to save");
    btn.disabled = false;
    btn.innerText = "Save";
  }
}

/* NAV */
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
