<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Insights</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef6fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 20px;
  max-width: 850px;
  margin: auto;
}

.card {
  margin-top: 16px;
  padding: 18px;
  border-radius: 12px;
  background: white;
}

.section {
  margin-top: 24px;
  font-size: 13px;
  font-weight: bold;
  color: #555;
  text-transform: uppercase;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item active">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Tips & Coaching</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Insights</h2>
  <div id="content"></div>
</div>

<script>

const API = "/api/v1";
const token = localStorage.getItem("ads_token");

function card(title, text) {
  return `<div class="card"><strong>${title}</strong><br>${text}</div>`;
}

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    let html = "";

    // =========================
    // ORIGINAL INSIGHTS UI
    // =========================

    if (data.distribution) {
      html += card("Decision Distribution",
        `${data.distribution.strong}% Strong<br>
         ${data.distribution.average}% Average<br>
         ${data.distribution.weak}% Weak`);
    }

    html += `<div class="section">Strategic Insights</div>`;

    if (data.primaryPattern) {
      html += card("Primary Pattern", data.primaryPattern);
    }

    if (data.recommendedFocus) {
      html += card("Recommended Focus", data.recommendedFocus);
    }

    if (data.behaviorReport?.recommendedAdjustments?.length) {
      html += card("Recommended Adjustments",
        data.behaviorReport.recommendedAdjustments
          .map(a => "• " + a)
          .join("<br>"));
    }

    html += `<div class="section">Overview</div>`;

    html += card("Evaluation Rate",
      `${data.evaluationRate || 0}% of your decisions have been evaluated`);

    html += card("Follow-Through Rate",
      `${data.followThroughRate || 0}% of your decisions would be made again`);

    // =========================
    // NEW — COST INSIGHTS (ADDED, NOT REPLACED)
    // =========================

    if (data.costInsights) {

      html += `<div class="section">Cost Insights</div>`;

      html += card("Total Spend",
        "$" + (data.costInsights.totalSpend || 0).toLocaleString());

      html += card("Expensive Mistakes",
        data.costInsights.expensiveMistakes);

      html += card("High-Value Wins",
        data.costInsights.expensiveWins);
    }

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = "Failed to load insights";
  }
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
