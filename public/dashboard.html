<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - OutcomeClarity</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

.header {
  padding: 15px;
  background: #111827;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.tag {
  padding: 6px 10px;
  border-radius: 6px;
  color: white;
  font-size: 12px;
}

button {
  padding: 6px 10px;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>OutcomeClarity</div>
  <div>
    <button onclick="goToSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <h2>Your Decisions</h2>
  <div id="decisions"></div>
</div>

<script>
/* =========================
   AUTH PROTECTION
========================= */
const token = localStorage.getItem("ads_token");

if (!token) {
  window.location.href = "/onboard.html";
}

/* =========================
   NAVIGATION
========================= */
function logout() {
  localStorage.removeItem("ads_token");
  window.location.href = "/onboard.html";
}

function goToSettings() {
  window.location.href = "/settings.html";
}

/* =========================
   COLOR LOGIC (FIXED)
========================= */

// Convert backend regretScore → UI satisfaction
function getSatisfactionFromEvaluation(evaluation) {
  // Assuming regretScore is 0–10 (higher = worse)
  return 10 - evaluation.regretScore;
}

function getDecisionColor(decision) {
  if (!decision.evaluations || decision.evaluations.length === 0) {
    return "#c4a484"; // clay
  }

  const satisfaction = getSatisfactionFromEvaluation(decision.evaluations[0]);

  if (satisfaction <= 3) return "#dc2626"; // red
  if (satisfaction <= 6) return "#2563eb"; // blue
  return "#16a34a"; // green
}

function getDecisionLabel(decision) {
  if (!decision.evaluations || decision.evaluations.length === 0) {
    return "Not evaluated";
  }

  const satisfaction = getSatisfactionFromEvaluation(decision.evaluations[0]);

  if (satisfaction <= 3) return "Poor";
  if (satisfaction <= 6) return "Mixed";
  return "Good";
}

/* =========================
   LOAD DATA
========================= */
async function loadDecisions() {
  try {
    const res = await fetch("/api/v1/decisions", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const decisions = await res.json();

    const container = document.getElementById("decisions");
    container.innerHTML = "";

    decisions.forEach(decision => {
      const color = getDecisionColor(decision);
      const label = getDecisionLabel(decision);

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div>
          <strong>${decision.title}</strong><br>
          <small>${decision.category || ""}</small>
        </div>
        <div class="tag" style="background:${color}">
          ${label}
        </div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("LOAD ERROR:", err);
  }
}

/* =========================
   INIT
========================= */
loadDecisions();
</script>

</body>
</html>
