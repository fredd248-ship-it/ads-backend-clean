<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tips & Coaching</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 30px;
  max-width: 850px;
  margin: auto;
}

.notice {
  background: #fff3cd;
  border: 1px solid #ffeeba;
  color: #856404;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 16px;
  font-size: 14px;
}

.letter {
  background: white;
  padding: 32px;
  border-radius: 14px;
  line-height: 2.0;
  font-size: 18px;
  color: #2c2c2c;
}

.letter p {
  margin-bottom: 20px;
}

.signature {
  margin-top: 28px;
  font-weight: bold;
  color: #444;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item active">Tips & Coaching</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Tips & Coaching</h2>
  <div id="content">Loading...</div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

function formatList(str) {
  if (!str) return "";
  const arr = str.split(",").map(s => s.trim());
  if (arr.length === 1) return arr[0];
  return arr.join(" and ");
}

function buildLetter(report, data) {

  const strengthsArr = (report.strengths || []).slice(0,3);
  const strengths = strengthsArr.join(", ");

  const weakArr = report.currentBlindSpot
    ? report.currentBlindSpot.split(",").map(x => x.trim())
    : [];

  const weakFormatted = formatList(report.currentBlindSpot);

  const habit = report.bestNextHabit;
  const adjustments = report.recommendedAdjustments || [];
  const distribution = data.distribution || {};

  /* INTRO LOGIC */

  let intro = "Your decision-making shows a mix of strong and weaker outcomes. ";

  if (distribution.strong >= 50) {
    intro = "You're making consistently strong decisions overall, which suggests your core decision-making process is working well. ";
  }

  if (distribution.weak >= 40) {
    intro = "There are clear patterns in your decision-making that need attention, particularly in how certain categories consistently underperform. ";
  }

  /* 🔴 FIXED GRAMMAR SENTENCE */

  let weakSentence = "";

  if (weakArr.length === 1) {
    weakSentence = `The category that consistently underperforms—${weakArr[0]}—represents your greatest opportunity for improvement.`;
  } else if (weakArr.length > 1) {
    weakSentence = `The categories that consistently underperform—${weakFormatted}—represent your greatest opportunity for improvement.`;
  }

  return `
    <div class="letter">

      <p>
        ${intro}
        ${strengths ? `You tend to make consistently strong decisions in categories like ${strengths}.` : ""}
        ${weakFormatted ? ` However, your results drop noticeably in ${weakFormatted}, where outcomes are less reliable.` : ""}
      </p>

      <p>
        Your decisions are distributed across strong, average, and weak categories. 
        This does not indicate a lack of ability—it indicates variability in how you approach different types of decisions.
        When you apply a structured approach, outcomes improve. When decisions are rushed or reactive, results decline.
      </p>

      ${weakSentence ? `<p>${weakSentence}</p>` : ""}

      <p>
        Context plays a major role in your outcomes. Decisions made under time pressure tend to reduce satisfaction, 
        while emotionally influenced decisions tend to introduce inconsistency. Recognizing these conditions before committing 
        can significantly improve your results.
      </p>

      <p>
        A practical adjustment going forward would be to ${habit.toLowerCase()}, 
        especially when you feel time pressure or emotional urgency.
      </p>

      ${
        adjustments.length
        ? `<p>
            To refine your approach further, focus on ${adjustments
              .map(a => a.toLowerCase())
              .join(", ")}.
          </p>`
        : ""
      }

      <p>
        Overall, your decision-making foundation is strong. With more consistency in execution, your results can become reliably strong.
      </p>

      <div class="signature">— Your Decision System</div>

    </div>
  `;
}

async function load(){

  const container = document.getElementById("content");

  try{

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    const report = data.behaviorReport;

    const evaluated = data.evaluatedDecisions || 0;

    if (evaluated < 3) {
      container.innerHTML = `
        <div class="notice">
          You need at least 3 evaluated decisions before meaningful coaching can be generated.
        </div>
      `;
      return;
    }

    let notice = "";

    if (evaluated < 8) {
      notice = `
        <div class="notice">
          Your coaching insights are still developing and will become more precise as more decisions are evaluated.
        </div>
      `;
    }

    container.innerHTML = notice + buildLetter(report, data);

  }catch(err){
    console.error(err);
    container.innerHTML = "Failed to load coaching insights.";
  }
}

/* NAVIGATION */

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
