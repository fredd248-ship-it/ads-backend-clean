<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tips & Coaching</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef6fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 24px;
  max-width: 900px;
  margin: auto;
}

/* MAIN COACHING BLOCK */

.coaching-card {
  background: white;
  padding: 22px;
  border-radius: 14px;
  border-left: 6px solid #4338ca;
  margin-bottom: 20px;
}

.coaching-title {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 10px;
}

.coaching-text {
  font-size: 15px;
  line-height: 1.7;
  color: #333;
}

/* SUPPORTING CARDS */

.section {
  margin-top: 20px;
  font-size: 13px;
  font-weight: bold;
  color: #555;
  text-transform: uppercase;
}

.card {
  margin-top: 12px;
  padding: 16px;
  border-radius: 12px;
  background: white;
}

.card-title {
  font-weight: bold;
  margin-bottom: 6px;
}

.card-text {
  font-size: 14px;
  line-height: 1.6;
}

/* STRENGTH TAGS */

.tags {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag {
  background: #e6f7ec;
  color: #1b5e20;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 13px;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item active">Tips & Coaching</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Tips & Coaching</h2>
  <div id="content"></div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    const report = data.behaviorReport;

    if (!report) {
      container.innerHTML = "Start evaluating more decisions to unlock coaching insights.";
      return;
    }

    let html = "";

    /* 🧠 MAIN COACHING BLOCK */

    html += `
      <div class="coaching-card">
        <div class="coaching-title">Your Coaching Summary</div>
        <div class="coaching-text">${report.coachingSummary}</div>
      </div>
    `;

    /* 🎯 FOCUS */

    html += `<div class="section">Where to Focus</div>`;

    html += `
      <div class="card">
        <div class="card-title">Current Blind Spot</div>
        <div class="card-text">${report.currentBlindSpot}</div>
      </div>
    `;

    html += `
      <div class="card">
        <div class="card-title">Best Next Step</div>
        <div class="card-text">${report.bestNextHabit}</div>
      </div>
    `;

    /* 🟢 STRENGTHS */

    if (report.strengths && report.strengths.length > 0) {
      html += `<div class="section">What You're Doing Well</div>`;

      html += `
        <div class="card">
          <div class="card-title">Your Strong Areas</div>
          <div class="card-text">
            You tend to make consistently good decisions in the following areas:
            <div class="tags">
              ${report.strengths.map(s => `<span class="tag">${s}</span>`).join("")}
            </div>
          </div>
        </div>
      `;
    }

    /* 🧩 GUIDANCE */

    if (report.recommendedAdjustments && report.recommendedAdjustments.length > 0) {
      html += `<div class="section">Suggestions to Improve</div>`;

      html += `
        <div class="card">
          <div class="card-title">Simple Adjustments</div>
          <div class="card-text">
            ${report.recommendedAdjustments.map(r => `• ${r}`).join("<br>")}
          </div>
        </div>
      `;
    }

    container.innerHTML = html;

  } catch (err) {
    console.error(err);
    container.innerHTML = "Failed to load coaching insights.";
  }
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
