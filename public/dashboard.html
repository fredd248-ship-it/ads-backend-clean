<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #eef2ff;
  height: 100vh;
  padding: 20px;
}

.nav-item {
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  background: #4f46e5;
  color: white;
}

.main {
  flex: 1;
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.add-btn {
  padding: 10px 16px;
  background: #10b981;
  color: white;
  border-radius: 8px;
  display: inline-block;
  cursor: pointer;
  margin-bottom: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-top: 10px;
}

.empty {
  text-align: center;
  margin-top: 60px;
}

.modal {
  display: none;
  position: fixed;
  top:0;left:0;width:100%;height:100%;
  background: rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:12px;
  width:320px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
}

.slider-label {
  margin-top:12px;
  font-size:14px;
}

button {
  margin-top:12px;
  padding:10px;
  width:100%;
  border:none;
  background:#4f46e5;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item">Dashboard</div>
</div>

<div class="main">

<h2>Dashboard</h2>

<div class="add-btn" onclick="openModal()">+ Create Decision</div>

<div id="content">Loading...</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Create Decision</h3>

    <input id="title" placeholder="Title">

    <input id="description" placeholder="Description">

    <!-- CATEGORY DROPDOWN -->
    <select id="category">
      <option>Lifestyle</option>
      <option>Subscription</option>
      <option>Vehicle</option>
      <option>Home</option>
      <option>Electronics</option>
      <option>Pets</option>
      <option>Career</option>
      <option>Investment</option>
      <option>Home Office</option>
      <option>Other</option>
    </select>

    <!-- COST (TEXT, NO ARROWS) -->
    <input id="cost" placeholder="Cost (optional)">

    <!-- EMOTION -->
    <div class="slider-label">
      Emotional Weight: <span id="emotionVal">5</span>
    </div>
    <input type="range" min="0" max="10" value="5" id="emotion">

    <!-- TIME PRESSURE -->
    <div class="slider-label">
      Time Pressure: <span id="timeVal">5</span>
    </div>
    <input type="range" min="0" max="10" value="5" id="timePressure">

    <button onclick="createDecision()">Create</button>
    <button onclick="closeModal()" style="background:#ccc;color:#000;">Cancel</button>

  </div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";

const token = localStorage.getItem("ads_token");
if (!token) {
  window.location.href = "login.html";
}

/* SLIDER DISPLAY */
document.getElementById("emotion").oninput = e =>
  document.getElementById("emotionVal").innerText = e.target.value;

document.getElementById("timePressure").oninput = e =>
  document.getElementById("timeVal").innerText = e.target.value;

/* LOAD */
async function load(){
  try {
    const res = await fetch(API + "/decisions", {
      headers:{ Authorization:"Bearer "+token }
    });

    const data = await res.json();
    const container = document.getElementById("content");

    if (!data.data.length){
      container.innerHTML = `
        <div class="empty">
          <h3>No decisions yet</h3>
        </div>
      `;
      return;
    }

    container.innerHTML = data.data.map(d => `
      <div class="card">
        <strong>${d.title}</strong><br>
        ${d.category || ""}
      </div>
    `).join("");

  } catch {
    document.getElementById("content").innerText = "Error loading data";
  }
}

/* MODAL */
function openModal(){ modal.style.display="flex"; }
function closeModal(){ modal.style.display="none"; }

/* CREATE */
async function createDecision(){

  const payload = {
    title: title.value,
    description: description.value,
    category: category.value,
    cost: cost.value ? Number(cost.value) : null,
    emotionalWeight: Number(emotion.value),
    timePressure: Number(timePressure.value)
  };

  const res = await fetch(API + "/decisions", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (!data.success){
    alert("Failed to save");
    return;
  }

  closeModal();
  load();
}

load();

</script>

</body>
</html>
