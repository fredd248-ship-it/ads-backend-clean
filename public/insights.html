<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Insights</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f6fb;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  max-width: 850px;
  margin: auto;
}

.section {
  margin-top: 28px;
  font-size: 12px;
  font-weight: bold;
  color: #555;
  text-transform: uppercase;
}

/* CARDS */
.card {
  margin-top: 14px;
  padding: 18px;
  border-radius: 12px;
  background: white;
  border-left: 4px solid #6366f1;
}

.card.outcome { border-left-color: #10b981; }
.card.pattern { border-left-color: #f59e0b; }
.card.overview { border-left-color: #3b82f6; }
.card.cost { border-left-color: #ef4444; }

.subtle {
  margin-top: 6px;
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item active">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Tips & Coaching</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Insights</h2>
  <div id="content"></div>
</div>

<script>

const API = "/api/v1";
const token = localStorage.getItem("ads_token");

function card(title, text, type = "") {
  return `<div class="card ${type}">
    <strong>${title}</strong><br>
    ${text}
  </div>`;
}

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    let html = "";

    /* =========================
       OUTCOME DISTRIBUTION
    ========================= */

    if (data.distribution) {

      const strong = data.distribution.strong || 0;
      const avg = data.distribution.average || 0;
      const weak = data.distribution.weak || 0;

      html += `<div class="section">Decision Outcomes</div>`;

      html += card(
        "Outcome Breakdown",
        `${strong}% Good outcomes<br>
         ${avg}% Mixed outcomes<br>
         ${weak}% Poor outcomes
         <div class="subtle">
         This reflects how your decisions are turning out after real-world use.
         </div>`,
        "outcome"
      );
    }

    /* =========================
       PATTERN INSIGHTS
    ========================= */

    html += `<div class="section">Behavior Patterns</div>`;

    if (data.primaryPattern) {
      html += card(
        "Observed Pattern",
        `${data.primaryPattern}
        <div class="subtle">
        This pattern reflects how your decisions behave over time, not just how they felt initially.
        </div>`,
        "pattern"
      );
    }

    if (data.recommendedFocus) {
      html += card(
        "Suggested Focus",
        `${data.recommendedFocus}
        <div class="subtle">
        Small adjustments here can improve future outcomes without changing everything at once.
        </div>`,
        "pattern"
      );
    }

    if (data.behaviorReport?.recommendedAdjustments?.length) {
      html += card(
        "Actionable Adjustments",
        data.behaviorReport.recommendedAdjustments
          .map(a => "• " + a)
          .join("<br>"),
        "pattern"
      );
    }

    /* =========================
       OVERVIEW
    ========================= */

    html += `<div class="section">Overview</div>`;

    html += card(
      "Evaluation Coverage",
      `${data.evaluationRate || 0}% of your decisions have been evaluated
       <div class="subtle">
       More evaluations lead to more accurate insights.
       </div>`,
      "overview"
    );

    html += card(
      "Follow-Through Behavior",
      `${data.followThroughRate || 0}% of decisions would be made again
       <div class="subtle">
       Indicates how often your decisions hold up over time.
       </div>`,
      "overview"
    );

    /* =========================
       COST INSIGHTS (REFINED)
    ========================= */

    if (data.costInsights) {

      html += `<div class="section">Cost Patterns</div>`;

      html += card(
        "Expensive Mistakes",
        data.costInsights.expensiveMistakes,
        "cost"
      );

      html += card(
        "High-Value Wins",
        data.costInsights.expensiveWins,
        "cost"
      );
    }

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = "Failed to load insights";
  }
}

/* NAV */
function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
