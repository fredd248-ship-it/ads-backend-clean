<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.create-section {
  margin-top: 40px;
  text-align: center;
}

.create-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #4338ca;
  color: white;
  font-size: 24px;
  border: none;
  cursor: pointer;
}

.main {
  flex: 1;
  padding: 20px;
  max-width: 800px;
  margin: auto;
}

.card {
  border-radius: 12px;
  padding: 16px;
  margin-top: 14px;
  cursor: pointer;
}

.clay { background: #e7d8c9; color:#333; }
.good { background: #16a34a; color: white; }
.mid { background: #2563eb; color: white; }
.bad { background: #dc2626; color: white; }

.card-title { font-weight: bold; }
.card-meta { font-size: 12px; opacity: 0.8; }

/* MODAL */
#evalModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-content {
  background:white;
  width:400px;
  margin:100px auto;
  padding:20px;
  border-radius:12px;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Decisions</h2>
  <div id="content">Loading...</div>
</div>

<!-- EVALUATION MODAL -->
<div id="evalModal">
  <div class="modal-content">

    <h3 id="modalTitle"></h3>

    <label>Satisfaction (0–10)</label>
    <input type="range" min="0" max="10" value="5" id="slider">

    <label>Frequency</label>
    <select id="frequency">
      <option>Low</option>
      <option selected>Medium</option>
      <option>High</option>
    </select>

    <label>Would you buy again?</label>
    <select id="again">
      <option value="true">Yes</option>
      <option value="false">No</option>
    </select>

    <button onclick="saveEval()">Save</button>
    <button onclick="closeModal()">Cancel</button>

  </div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

let activeDecisionId = null;

function getColorClass(d){
  if(!d.evaluations.length) return "clay";
  const s = 10 - d.evaluations[d.evaluations.length-1].regretScore;
  if(s <=3) return "bad";
  if(s <=6) return "mid";
  return "good";
}

function openModal(d){
  activeDecisionId = d.id;
  document.getElementById("modalTitle").innerText = d.title;
  document.getElementById("evalModal").style.display = "block";
}

function closeModal(){
  document.getElementById("evalModal").style.display = "none";
}

async function saveEval(){
  const satisfaction = Number(document.getElementById("slider").value);
  const regretScore = 10 - satisfaction;
  const frequency = document.getElementById("frequency").value;
  const again = document.getElementById("again").value === "true";

  await fetch(API + "/decisions/" + activeDecisionId + "/evaluate", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify({
      regretScore,
      frequencyOfUse: frequency,
      wouldBuyAgain: again
    })
  });

  closeModal();
  load();
}

async function load(){
  const res = await fetch(API + "/decisions", {
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();
  const decisions = data.data || [];

  const content = document.getElementById("content");

  content.innerHTML = decisions.map(d => {
    const cat = d.category || "Uncategorized";
    const cost = d.cost ? "$"+d.cost : "";

    return `
      <div class="card ${getColorClass(d)}" onclick='openModal(${JSON.stringify(d)})'>
        <div class="card-title">${d.title}</div>
        <div class="card-meta">${cat} ${cost ? "• "+cost : ""}</div>
      </div>
    `;
  }).join("");
}

function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
