<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tips & Coaching</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #eef6fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 28px;
  max-width: 900px;
  margin: auto;
}

/* LETTER STYLE */

.letter {
  background: white;
  padding: 28px;
  border-radius: 14px;
  line-height: 1.9;
  font-size: 17px;
  color: #2c2c2c;
}

.letter p {
  margin-bottom: 18px;
}

.signature {
  margin-top: 28px;
  font-weight: bold;
  color: #444;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item active">Tips & Coaching</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Tips & Coaching</h2>
  <div id="content"></div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

function buildLetter(report, data) {

  const strengthsArr = report.strengths ? report.strengths.slice(0, 3) : [];
  const strengths = strengthsArr.join(", ");

  const blindSpot = report.currentBlindSpot;
  const habit = report.bestNextHabit;
  const adjustments = report.recommendedAdjustments || [];

  const distribution = data.distribution;
  const time = data.timePressureInsight;
  const emotion = data.emotionalInsight;
  const usage = data.usageInsight;

  let distributionInsight = "";

  if (distribution) {
    if (distribution.strong >= 50) {
      distributionInsight = "A large portion of your decisions are strong, which shows you have a solid decision-making foundation.";
    } else if (distribution.weak >= 40) {
      distributionInsight = "A noticeable portion of your decisions are underperforming, which suggests there are a few habits worth tightening.";
    } else {
      distributionInsight = "Your results are mixed, suggesting inconsistency rather than lack of ability.";
    }
  }

  return `
    <div class="letter">

      <p>${report.coachingSummary}</p>

      ${distributionInsight ? `<p>${distributionInsight}</p>` : ""}

      ${
        blindSpot && blindSpot !== "No clear blind spots detected"
        ? `<p>
            One area worth paying closer attention to is ${blindSpot}.
            This is where your outcomes have been consistently weaker, and where more deliberate decision-making could create immediate improvement.
          </p>`
        : ""
      }

      ${
        strengths
        ? `<p>
            You’re at your best in areas like ${strengths}, where your decisions tend to produce consistently strong outcomes.
            These are patterns you can rely on and apply more intentionally elsewhere.
          </p>`
        : ""
      }

      ${
        habit
        ? `<p>
            A useful adjustment going forward would be to ${habit.toLowerCase()}.
            Even a small increase in deliberate evaluation here can significantly improve your results.
          </p>`
        : ""
      }

      ${
        (time || emotion || usage)
        ? `<p>
            There are also patterns in how context affects your decisions.
            ${time ? time + ". " : ""}
            ${emotion ? emotion + ". " : ""}
            ${usage ? usage + ". " : ""}
            Becoming aware of these patterns can help you avoid predictable mistakes.
          </p>`
        : ""
      }

      ${
        adjustments.length
        ? `<p>
            If you want to refine your approach further, consider this: ${adjustments
              .map(a => a.toLowerCase())
              .join(", ")}.
          </p>`
        : ""
      }

      <p>
        Overall, your decision-making is stronger than it may initially appear.
        This isn’t about making major changes—it’s about tightening a few key behaviors in the right situations.
      </p>

      <div class="signature">— Your Decision System</div>

    </div>
  `;
}

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    const report = data.behaviorReport;

    if (!report) {
      container.innerHTML = "Start evaluating more decisions to unlock coaching insights.";
      return;
    }

    container.innerHTML = buildLetter(report, data);

  } catch (err) {
    console.error(err);
    container.innerHTML = "Failed to load coaching insights.";
  }
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
