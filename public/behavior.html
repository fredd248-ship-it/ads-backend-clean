<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tips & Coaching</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #eef6fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 24px;
  max-width: 900px;
  margin: auto;
}

/* LETTER STYLE */

.letter {
  background: white;
  padding: 26px;
  border-radius: 14px;
  line-height: 1.8;
  font-size: 15.5px;
  color: #2c2c2c;
}

.letter p {
  margin-bottom: 16px;
}

.signature {
  margin-top: 24px;
  font-weight: bold;
  color: #444;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item active">Tips & Coaching</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Tips & Coaching</h2>
  <div id="content"></div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

function buildLetter(report) {

  const strengths = report.strengths?.join(", ");
  const blindSpot = report.currentBlindSpot;
  const habit = report.bestNextHabit;
  const adjustments = report.recommendedAdjustments || [];

  return `
    <div class="letter">

      <p>${report.coachingSummary}</p>

      ${
        blindSpot && blindSpot !== "No clear blind spots detected"
        ? `<p>
            One pattern worth paying closer attention to is ${blindSpot}.
            This is where your results have been less consistent, and where even small adjustments could make a noticeable difference.
          </p>`
        : ""
      }

      ${
        strengths
        ? `<p>
            At the same time, you’re making strong decisions in areas like ${strengths}.
            These are situations where your instincts and approach are clearly working well—something you can rely on more intentionally.
          </p>`
        : ""
      }

      ${
        habit
        ? `<p>
            Going forward, a useful adjustment would be to ${habit.toLowerCase()}.
            This kind of shift tends to have an outsized impact, especially in areas that currently underperform.
          </p>`
        : ""
      }

      ${
        adjustments.length
        ? `<p>
            If you want to refine things further, consider this approach: ${adjustments
              .map(a => a.toLowerCase())
              .join(", ")}.
          </p>`
        : ""
      }

      <p>
        Overall, your decision-making foundation is strong. This isn’t about major changes—
        it’s about being slightly more deliberate in the right moments.
      </p>

      <div class="signature">— Your Decision System</div>

    </div>
  `;
}

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    const report = data.behaviorReport;

    if (!report) {
      container.innerHTML = "Start evaluating more decisions to unlock coaching insights.";
      return;
    }

    container.innerHTML = buildLetter(report);

  } catch (err) {
    console.error(err);
    container.innerHTML = "Failed to load coaching insights.";
  }
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
