<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 320px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
}

.message {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Create Account (DEBUG)</h2>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />
  <input id="inviteCode" placeholder="Access Code" />

  <button onclick="register()">Create Account</button>

  <div id="message" class="message"></div>
</div>

<script>
async function register() {

  const msg = document.getElementById("message");
  msg.innerText = "STEP 1: Button clicked";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  let inviteCode = document.getElementById("inviteCode").value;

  inviteCode = inviteCode.trim().toUpperCase();

  try {

    msg.innerText = "STEP 2: Sending request...";

    const res = await fetch("https://ads-backend-clean.onrender.com/api/v1/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password,
        inviteCode
      })
    });

    msg.innerText = "STEP 3: Response received (" + res.status + ")";

    const data = await res.json();

    msg.innerText = "STEP 4: " + JSON.stringify(data);

  } catch (err) {

    msg.innerText = "STEP ERROR: " + err.message;
  }
}
</script>

</body>
</html>
