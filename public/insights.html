<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Insights</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef6fb;
  display: flex;
}

/* SIDEBAR */

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

/* MAIN */

.main {
  flex: 1;
  padding: 20px;
  max-width: 820px;
  margin: auto;
}

/* CARDS */

.card {
  margin-top: 14px;
  padding: 16px;
  border-radius: 12px;
  border-left: 5px solid;
  background: white;
}

.low { border-color: #4caf50; background: #f3faf5; }
.medium { border-color: #ff9800; background: #fff7ed; }
.high { border-color: #f44336; background: #fdecec; }

.title {
  font-weight: bold;
  margin-bottom: 6px;
  font-size: 15px;
}

.text {
  font-size: 14px;
  line-height: 1.6;
}

/* DISTRIBUTION */

.distribution {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.dist-box {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  margin-right: 8px;
  font-weight: bold;
}

.dist-box:last-child {
  margin-right: 0;
}

.strong { background: #e6f7ec; color: #1b5e20; }
.average { background: #fff3e0; color: #e65100; }
.weak { background: #fdecea; color: #b71c1c; }
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item active">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Insights</h2>
  <div id="content"></div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

function card(title, content, severity="low") {
  return `
    <div class="card ${severity}">
      <div class="title">${title}</div>
      <div class="text">${content}</div>
    </div>
  `;
}

function severityFromText(text) {
  if (!text) return "low";
  if (text.includes("average 3") || text.includes("average 4")) return "high";
  if (text.includes("average 5") || text.includes("average 6")) return "medium";
  return "low";
}

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    const total = data.totalDecisions || 0;
    const evaluated = data.evaluatedDecisions || 0;
    const followThrough = data.followThroughRate || 0;

    const rate = total > 0
      ? Math.round((evaluated / total) * 100)
      : 0;

    let html = "";

    /* DISTRIBUTION (TOP PRIORITY) */

    if (data.distribution) {
      html += card(
        "Decision Distribution",
        `
        <div class="distribution">
          <div class="dist-box strong">
            ${data.distribution.strong}%<br>Strong
          </div>
          <div class="dist-box average">
            ${data.distribution.average}%<br>Average
          </div>
          <div class="dist-box weak">
            ${data.distribution.weak}%<br>Weak
          </div>
        </div>
        `
      );
    }

    /* CORE METRICS */

    html += card(
      "Evaluation Rate",
      `${rate}% of your decisions have been evaluated`
    );

    html += card(
      "Follow-Through Rate",
      `${followThrough}% of your decisions would be made again`
    );

    /* TIME PRESSURE */

    if (data.timePressureInsight) {
      html += card(
        "Time Pressure Impact",
        data.timePressureInsight,
        severityFromText(data.timePressureInsight)
      );
    }

    /* EMOTIONAL */

    if (data.emotionalInsight) {
      html += card(
        "Emotional Impact",
        data.emotionalInsight,
        severityFromText(data.emotionalInsight)
      );
    }

    /* USAGE */

    if (data.usageInsight) {
      html += card(
        "Usage vs Satisfaction",
        data.usageInsight,
        severityFromText(data.usageInsight)
      );
    }

    container.innerHTML = html;

  } catch (err) {
    console.error(err);
    container.innerHTML = "<div>Failed to load</div>";
  }
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
