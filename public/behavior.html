<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tips & Coaching</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 30px;
  max-width: 850px;
  margin: auto;
}

.letter {
  background: white;
  padding: 28px;
  border-radius: 14px;
  line-height: 1.9;
  font-size: 17px;
  color: #2c2c2c;
}

.letter p {
  margin-bottom: 18px;
}

.signature {
  margin-top: 28px;
  font-weight: bold;
  color: #444;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item active">Tips & Coaching</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Tips & Coaching</h2>
  <div id="content">Loading...</div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

function buildLetter(report, data) {

  const strengthsArr = (report.strengths || []).slice(0,3);
  const strengths = strengthsArr.join(", ");

  const blindSpotRaw = report.currentBlindSpot || "";
  const blindSpot = blindSpotRaw.replace(",", " and");

  const habit = report.bestNextHabit;
  const adjustments = report.recommendedAdjustments || [];

  const distribution = data.distribution || {};
  const time = data.timePressureInsight || "";
  const emotion = data.emotionalInsight || "";

  /* 🧠 ADAPTIVE TONE */

  let intro = "Your decision-making shows a mix of strong and weaker outcomes. ";

  if (distribution.strong >= 50) {
    intro = "You're making consistently strong decisions overall, which suggests your core decision-making process is working well. ";
  }

  if (distribution.weak >= 40) {
    intro = "There are clear patterns in your decision-making that need attention, particularly in how certain categories consistently underperform. ";
  }

  /* 🧠 DISTRIBUTION EXPANSION */

  let distributionInsight = `
    <p>
      Your decisions are distributed across strong, average, and weak categories. 
      This doesn’t indicate a lack of ability—it indicates variability in how you approach different types of decisions.
      In other words, when you apply a structured and deliberate approach, your outcomes are strong. 
      When that structure breaks down—often due to context or speed—your results decline.
    </p>
  `;

  /* 🧠 CONTEXT ANALYSIS */

  let context = `
    <p>
      A key driver behind this pattern appears to be context. Decisions made under time pressure tend to result in lower satisfaction, 
      suggesting that speed is working against your decision quality. At the same time, decisions made with higher emotional weight 
      tend to produce less consistent outcomes, indicating that emotion may be influencing your judgment more than intended in those moments.
      Recognizing these situations before committing is one of the highest leverage improvements you can make.
    </p>
  `;

  return `
    <div class="letter">

      <p>
        ${intro}
        You tend to make consistently strong decisions in categories like ${strengths}. 
        However, your results drop noticeably in ${blindSpot}, where outcomes are less reliable and tend to fall short.
      </p>

      ${distributionInsight}

      <p>
        The categories that consistently underperform—${blindSpot}—represent your greatest opportunity for improvement. 
        These are not random outcomes; they are patterns, and patterns can be corrected.
      </p>

      ${context}

      <p>
        A practical adjustment going forward would be to ${habit.toLowerCase()}, especially in weaker categories 
        or in situations where you feel time pressure or emotional urgency. Even a small pause to compare alternatives 
        can significantly improve your outcomes.
      </p>

      ${
        adjustments.length
        ? `<p>
            To refine your approach further, focus on ${adjustments
              .map(a => a.toLowerCase())
              .join(", ")}.
          </p>`
        : ""
      }

      <p>
        Overall, your decision-making foundation is strong. This is not about making major changes—it’s about 
        becoming more consistent in how you apply good decision-making across all categories. 
        With a more deliberate approach in the right situations, your results can become reliably strong.
      </p>

      <div class="signature">— Your Decision System</div>

    </div>
  `;
}

async function load(){

  const container = document.getElementById("content");

  try{

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    const report = data.behaviorReport;

    if (!report){
      container.innerHTML = "Start evaluating more decisions to unlock coaching insights.";
      return;
    }

    container.innerHTML = buildLetter(report, data);

  }catch(err){
    console.error(err);
    container.innerHTML = "Failed to load coaching insights.";
  }
}

/* NAVIGATION — UNTOUCHED */

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
