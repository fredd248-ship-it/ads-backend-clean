<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS History</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

/* STATS */

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.stat-card {
  background: white;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.05);
}

.stat-title {
  font-size: 13px;
  color: #666;
}

.stat-value {
  font-size: 18px;
  font-weight: bold;
  margin-top: 4px;
}

/* LIST */

.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-top: 14px;
  border: 1px solid rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item active">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>History</h2>

  <div class="stats" id="stats"></div>

  <div id="list"></div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

function stat(title, value) {
  return `
    <div class="stat-card">
      <div class="stat-title">${title}</div>
      <div class="stat-value">${value}</div>
    </div>
  `;
}

async function load() {

  const res = await fetch(API + "/insights", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  const total = data.totalDecisions || 0;
  const evaluated = data.evaluatedDecisions || 0;
  const pending = total - evaluated;

  const avgScore = data.averageScore || 0;

  // 🔥 MOST USED CATEGORY
  const categoryCount = {};

  (data.scores || []).forEach(s => {
    const cat = s.category || "other";
    categoryCount[cat] = (categoryCount[cat] || 0) + 1;
  });

  let topCategory = "N/A";
  let max = 0;

  Object.keys(categoryCount).forEach(cat => {
    if (categoryCount[cat] > max) {
      max = categoryCount[cat];
      topCategory = cat;
    }
  });

  document.getElementById("stats").innerHTML = `
    ${stat("Total Decisions", total)}
    ${stat("Evaluated", evaluated)}
    ${stat("Pending", pending)}
    ${stat("Evaluation Rate", total > 0 ? Math.round((evaluated / total) * 100) + "%" : "0%")}
    ${stat("Average Satisfaction", avgScore + "/10")}
    ${stat("Most Used Category", topCategory)}
  `;

  document.getElementById("list").innerHTML = (data.scores || []).map(s => `
    <div class="card">
      <strong>${s.title}</strong><br>
      Score: ${s.displayScore}/10<br>
      ${s.category || ""}
    </div>
  `).join("");
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
