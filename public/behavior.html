<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tips & Coaching</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #eef6fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 28px;
  max-width: 900px;
  margin: auto;
}

.letter {
  background: white;
  padding: 28px;
  border-radius: 14px;
  line-height: 1.9;
  font-size: 17px;
  color: #2c2c2c;
}

.letter p {
  margin-bottom: 18px;
}

.signature {
  margin-top: 28px;
  font-weight: bold;
  color: #444;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item active">Tips & Coaching</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Tips & Coaching</h2>
  <div id="content"></div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

function buildLetter(report, data) {

  const strengthsArr = report.strengths ? report.strengths.slice(0, 3) : [];
  const strengths = strengthsArr.join(", ");

  const blindSpot = report.currentBlindSpot;
  const habit = report.bestNextHabit;
  const adjustments = report.recommendedAdjustments || [];

  const distribution = data.distribution;
  const time = data.timePressureInsight;
  const emotion = data.emotionalInsight;

  /* 🧠 ADAPTIVE TONE */

  let toneIntro = "";

  if (distribution) {
    if (distribution.weak >= 40) {
      toneIntro = "There are some clear patterns in your decision-making that need attention. ";
    } else if (distribution.strong >= 50) {
      toneIntro = "You're making consistently strong decisions overall. ";
    } else {
      toneIntro = "Your decision-making shows a mix of strong and weaker outcomes. ";
    }
  }

  /* 🧠 CONTEXT INTERPRETATION */

  let contextInsight = "";

  if (time || emotion) {

    let timeMsg = "";
    let emotionMsg = "";

    if (time && time.includes("High-pressure decisions average")) {
      timeMsg = "Decisions made under time pressure tend to produce lower satisfaction, suggesting rushed choices may be impacting outcomes.";
    }

    if (emotion && emotion.includes("High-emotion decisions average")) {
      emotionMsg = "Emotion-driven decisions appear to reduce overall satisfaction, indicating that emotional weight may be influencing judgment more than intended.";
    }

    if (timeMsg || emotionMsg) {
      contextInsight = `${timeMsg} ${emotionMsg}`.trim();
    }
  }

  return `
    <div class="letter">

      <p>${toneIntro}${report.coachingSummary}</p>

      ${
        distribution
        ? `<p>
            ${
              distribution.strong >= 50
                ? "A large percentage of your decisions fall into the strong category, reinforcing that your foundation is solid."
                : distribution.weak >= 40
                ? "A meaningful percentage of your decisions fall into the weak category, which highlights where improvement will have the biggest impact."
                : "Your decisions are distributed across strong, average, and weak categories, pointing to inconsistency rather than lack of ability."
            }
          </p>`
        : ""
      }

      ${
        blindSpot && blindSpot !== "No clear blind spots detected"
        ? `<p>
            The categories that stand out as underperforming are ${blindSpot}.
            These are the areas where a more deliberate approach will likely produce immediate gains.
          </p>`
        : ""
      }

      ${
        strengths
        ? `<p>
            At the same time, you're making strong decisions in categories like ${strengths}.
            These are patterns worth trusting and applying more consistently elsewhere.
          </p>`
        : ""
      }

      ${
        contextInsight
        ? `<p>
            ${contextInsight}
            Becoming more aware of these situational patterns can help you avoid predictable decision traps.
          </p>`
        : ""
      }

      ${
        habit
        ? `<p>
            A practical adjustment going forward would be to ${habit.toLowerCase()}.
            Small improvements in how you approach these decisions will compound quickly.
          </p>`
        : ""
      }

      ${
        adjustments.length
        ? `<p>
            To take this further, consider this approach: ${adjustments
              .map(a => a.toLowerCase())
              .join(", ")}.
          </p>`
        : ""
      }

      <p>
        Overall, your decision-making is not far off from being consistently strong.
        The opportunity here is refinement—being more intentional in the categories and situations where your results currently fall short.
      </p>

      <div class="signature">— Your Decision System</div>

    </div>
  `;
}

async function load() {

  const container = document.getElementById("content");
  container.innerHTML = "Loading...";

  try {

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    const report = data.behaviorReport;

    if (!report) {
      container.innerHTML = "Start evaluating more decisions to unlock coaching insights.";
      return;
    }

    container.innerHTML = buildLetter(report, data);

  } catch (err) {
    console.error(err);
    container.innerHTML = "Failed to load coaching insights.";
  }
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
