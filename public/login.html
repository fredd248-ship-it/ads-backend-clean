<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 12px;
  width: 320px;
  border: 1px solid rgba(0,0,0,0.05);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 14px;
  border-radius: 8px;
  border: none;
  background: #4f46e5;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.link {
  margin-top: 12px;
  text-align: center;
  font-size: 14px;
  color: #4f46e5;
  cursor: pointer;
}

.error {
  color: red;
  font-size: 13px;
  margin-top: 8px;
  text-align: center;
}
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="goRegister()">
    Create Account
  </div>

  <div class="error" id="error"></div>
</div>

<script>

/* ✅ CORRECT BACKEND */
const API = "https://ads-backend-clean.onrender.com/api/v1";

/* 🔧 AUTO REDIRECT IF ALREADY LOGGED IN */
const existing = localStorage.getItem("ads_token");
if (existing && existing !== "undefined" && existing !== "null") {
  window.location.href = "dashboard.html";
}

/* LOGIN */
async function login(){

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("error");

  errorBox.innerText = "";

  if (!email || !password){
    errorBox.innerText = "Enter email and password";
    return;
  }

  try {

    const res = await fetch(API + "/auth/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    /* 🔧 CRITICAL FIX */
    const token = data.token || data.data?.token;

    if (!token){
      errorBox.innerText = "Invalid credentials";
      return;
    }

    localStorage.setItem("ads_token", token);

    window.location.href = "dashboard.html";

  } catch {
    errorBox.innerText = "Server error";
  }
}

/* NAV */
function goRegister(){
  window.location.href = "register.html";
}

</script>

</body>
</html>
