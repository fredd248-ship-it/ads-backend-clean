<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tips & Coaching</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.main {
  flex: 1;
  padding: 30px;
  max-width: 850px;
  margin: auto;
}

.notice {
  background: #fff3cd;
  border: 1px solid #ffeeba;
  color: #856404;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 16px;
  font-size: 14px;
}

.letter {
  background: white;
  padding: 32px;
  border-radius: 14px;
  line-height: 2.0;
  font-size: 18px;
  color: #2c2c2c;
}

.letter p {
  margin-bottom: 20px;
}

.signature {
  margin-top: 28px;
  font-weight: bold;
  color: #444;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item active">Tips & Coaching</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Tips & Coaching</h2>
  <div id="content">Loading...</div>
</div>

<script>

const API = "/api/v1";
const token = localStorage.getItem("ads_token");

function formatList(str) {
  if (!str) return "";
  const arr = str.split(",").map(s => s.trim());
  return arr.join(", ");
}

function buildLetter(report, data) {

  const strengths = (report.strengths || []).slice(0,3).join(", ");
  const weak = formatList(report.currentBlindSpot);
  const adjustments = report.recommendedAdjustments || [];
  const distribution = data.distribution || {};
  const cost = data.costInsights || {};

  /* INTRO */

  let intro = "Your results show a mix of strong and less consistent outcomes across different types of decisions.";

  if (distribution.strong >= 50) {
    intro = "You're making consistently strong decisions overall, which indicates that your core decision-making process is sound.";
  }

  if (distribution.weak >= 40) {
    intro = "There are clear patterns in your decision-making that point to specific areas where your approach is breaking down.";
  }

  /* CATEGORY INSIGHT */

  const categoryInsight = weak
    ? `The category that consistently underperforms—${weak}—represents your clearest opportunity for improvement right now.`
    : "";

  /* TEMPORAL INTELLIGENCE */

  const temporal = `
Your recent decisions show a consistent relationship between how decisions are made and how they perform. When decisions are approached deliberately, outcomes improve. When they are made under time pressure or urgency, results become less consistent. This pattern is a primary driver of your variability.
`;

  /* CONTEXT */

  const context = `
Time pressure and emotional weight are the two strongest behavioral forces influencing your outcomes. Decisions made quickly tend to reduce satisfaction, while emotionally driven decisions introduce inconsistency. Recognizing these conditions before committing creates an opportunity to improve results.
`;

  /* COST INTELLIGENCE (DEEP) */

  let costInsight = "";

  if (cost.expensiveMistakes > cost.expensiveWins) {
    costInsight = `
A clear financial pattern is emerging. Higher-cost decisions are more likely to result in lower satisfaction. This suggests that as stakes increase, your process becomes less structured or more reactive. These outcomes are not random—they reflect a shift in decision behavior under pressure.

Improving your process specifically for higher-cost decisions would have a disproportionately large impact on your overall results, as these decisions carry greater consequence.
`;
  }

  if (cost.expensiveWins > cost.expensiveMistakes && cost.expensiveWins > 2) {
    costInsight = `
One of your strongest behavioral signals appears in higher-cost decisions. When you take time to evaluate significant commitments carefully, your outcomes are consistently strong. This indicates that your decision-making process is highly effective when applied deliberately.

The opportunity is not to change your process—but to apply that same level of structure consistently, even in lower-stakes or faster decisions.
`;
  }

  return `
  <div class="letter">

    <p>
      ${intro}
      ${strengths ? ` You consistently perform well in categories like ${strengths}, where your approach appears more structured and reliable.` : ""}
      ${weak ? ` In contrast, your results drop in ${weak}, where outcomes are less predictable.` : ""}
    </p>

    <p>
      Your decisions are distributed across strong, average, and weak outcomes. This does not indicate a lack of ability—it indicates inconsistency in execution. When your process is structured, results improve. When it becomes reactive, results decline.
    </p>

    ${categoryInsight ? `<p>${categoryInsight}</p>` : ""}

    <p>${temporal}</p>

    <p>${context}</p>

    ${costInsight ? `<p>${costInsight}</p>` : ""}

    <p>
      A practical adjustment going forward is to deliberately slow down and evaluate your options before committing—especially in moments of time pressure or emotional urgency. These are the moments where small changes in approach produce the largest improvements in outcome.
    </p>

    ${adjustments.length ? `
      <p>
        To strengthen your decision-making further, focus on ${adjustments.map(a => a.toLowerCase()).join(", ")}.
      </p>
    ` : ""}

    <p>
      Overall, your foundation is strong. The opportunity now is refinement—applying the same level of clarity, structure, and discipline to the situations where your results currently fall short.
    </p>

    <div class="signature">— Your Decision System</div>

  </div>
  `;
}

async function load(){

  const container = document.getElementById("content");

  try{

    const res = await fetch(API + "/insights", {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();
    const report = data.behaviorReport;

    const evaluated = data.evaluatedDecisions || 0;

    if (evaluated < 3) {
      container.innerHTML = `<div class="notice">Not enough data yet.</div>`;
      return;
    }

    let notice = "";

    if (evaluated < 8) {
      notice = `<div class="notice">Insights are stabilizing and will become more precise with additional data.</div>`;
    }

    container.innerHTML = notice + buildLetter(report, data);

  } catch (err){
    container.innerHTML = "Failed to load coaching.";
  }
}

function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
