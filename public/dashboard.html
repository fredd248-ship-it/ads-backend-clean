<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#111827;
  color:white;
  height:100vh;
  padding:20px;
  box-sizing:border-box;
}

.sidebar h2 {
  font-size:18px;
  margin-bottom:20px;
}

.sidebar a {
  display:block;
  color:#d1d5db;
  text-decoration:none;
  padding:10px;
  border-radius:6px;
  margin-bottom:6px;
}

.sidebar a:hover {
  background:#1f2937;
  color:white;
}

/* MAIN AREA */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-weight:bold;
}

.container {
  padding:16px;
}

.card {
  background:white;
  border-radius:12px;
  padding:14px;
  margin-bottom:10px;
}

.empty {
  text-align:center;
  margin-top:60px;
}

/* FAB */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  background:#4f46e5;
  color:white;
  border-radius:50%;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:12px;
  width:320px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
}

button {
  margin-top:12px;
  padding:10px;
  width:100%;
  border:none;
  background:#4f46e5;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>ADS</h2>

  <a href="dashboard.html">Dashboard</a>
  <a href="history.html">History</a>
  <a href="evaluations.html">Evaluations</a>
  <a href="insights.html">Insights</a>
  <a href="behavior.html">Behavior</a>
  <a href="settings.html">Settings</a>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <div>Decisions</div>
  </div>

  <div class="container" id="content">Loading...</div>

</div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Create Decision</h3>

    <input id="title" placeholder="Title">

    <select id="category">
      <option>Home Office</option>
      <option>Travel</option>
      <option>Relationship</option>
      <option>Job</option>
      <option>Lawn and Garden</option>
      <option>Electronics</option>
      <option>Home</option>
      <option>Outdoors and Patio</option>
      <option>Vehicle</option>
      <option>Moving</option>
      <option>Work</option>
      <option>Business</option>
      <option>Tools</option>
      <option>Clothing</option>
      <option>Decor</option>
    </select>

    <input id="cost" placeholder="Cost (optional)">

    <button onclick="createDecision()">Create</button>
    <button onclick="closeModal()" style="background:#ccc;color:#000;">Cancel</button>

  </div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

/* LOAD */
async function load(){
  try {
    const res = await fetch(API + "/decisions", {
      headers:{ Authorization:"Bearer "+token }
    });

    const data = await res.json();

    if (!data.success){
      content.innerText = "Error loading data";
      return;
    }

    if (!data.data.length){
      content.innerHTML = "<div class='empty'>No decisions yet</div>";
      return;
    }

    content.innerHTML = data.data.map(d => `
      <div class="card">
        <strong>${d.title}</strong><br>
        ${d.category || ""}
      </div>
    `).join("");

  } catch {
    content.innerText = "Error loading data";
  }
}

/* MODAL */
function openModal(){ modal.style.display="flex"; }
function closeModal(){ modal.style.display="none"; }

/* CREATE */
async function createDecision(){

  const payload = {
    title: title.value,
    category: category.value,
    cost: cost.value ? Number(cost.value) : null
  };

  const res = await fetch(API + "/decisions", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (!data.success){
    alert("Save failed");
    return;
  }

  closeModal();
  load();
}

load();

</script>

</body>
</html>
