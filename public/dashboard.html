<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

/* CARDS */
.card {
  border-radius: 12px;
  padding: 16px;
  margin-top: 14px;
  cursor: pointer;
}

.clay { background: #e7d8c9; color: #333; }
.good { background: #16a34a; color: white; }
.mid  { background: #2563eb; color: white; }
.bad  { background: #dc2626; color: white; }

.card-title { font-weight: bold; }
.card-meta { font-size: 12px; opacity: 0.8; }

/* MODAL */
#evalModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  width: 520px;
  max-width: 90%;
  padding: 24px;
  border-radius: 14px;
}

.modal-content h3 { margin-top: 0; }

.modal-content label {
  display: block;
  margin-top: 18px;
}

.modal-content input,
.modal-content select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
}

.modal-content button {
  margin-top: 16px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.save-btn { background: #4338ca; color: white; }
.cancel-btn { background: #e5e7eb; }

</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">
  <h2>Decisions</h2>
  <div id="content">Loading...</div>
</div>

<!-- EVALUATION MODAL -->
<div id="evalModal">
  <div class="modal-content">

    <h3 id="modalTitle"></h3>

    <label>Satisfaction (0–10)</label>
    <input type="range" min="0" max="10" value="5" id="slider">

    <label>Frequency of Use</label>
    <select id="frequency">
      <option>Low</option>
      <option selected>Medium</option>
      <option>High</option>
    </select>

    <label>Would you buy again?</label>
    <select id="again">
      <option value="true">Yes</option>
      <option value="false">No</option>
    </select>

    <button class="save-btn" onclick="saveEval()">Save Evaluation</button>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>

  </div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

let activeDecisionId = null;

/* COLOR LOGIC */
function getColorClass(d){
  if(!d.evaluations || d.evaluations.length === 0) return "clay";

  const evalData = d.evaluations[d.evaluations.length - 1];
  const satisfaction = 10 - evalData.regretScore;

  if(satisfaction <= 3) return "bad";
  if(satisfaction <= 6) return "mid";
  return "good";
}

/* MODAL */
function openModal(id, title){
  activeDecisionId = id;
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("evalModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("evalModal").style.display = "none";
}

/* SAVE */
async function saveEval(){

  if(!activeDecisionId){
    alert("Missing decision");
    return;
  }

  const satisfaction = Number(document.getElementById("slider").value);
  const regretScore = 10 - satisfaction;
  const frequency = document.getElementById("frequency").value;
  const again = document.getElementById("again").value === "true";

  try {
    const res = await fetch(API + "/decisions/" + activeDecisionId + "/evaluate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        regretScore,
        frequencyOfUse: frequency,
        wouldBuyAgain: again
      })
    });

    if(!res.ok){
      const err = await res.json();
      alert("Save failed: " + (err.error || "Unknown error"));
      return;
    }

    closeModal();
    load();

  } catch {
    alert("Network error");
  }
}

/* LOAD */
async function load(){

  try {
    const res = await fetch(API + "/decisions", {
      headers: { Authorization: "Bearer " + token }
    });

    const raw = await res.json();

    // ✅ Handles BOTH formats
    let decisions = [];

    if (Array.isArray(raw)) {
      decisions = raw;
    } else if (raw && Array.isArray(raw.data)) {
      decisions = raw.data;
    }

    const content = document.getElementById("content");

    if(decisions.length === 0){
      content.innerHTML = "<p>No decisions yet.</p>";
      return;
    }

    content.innerHTML = decisions.map(d => {

      const category = d.category || "Uncategorized";
      const cost = d.cost ? "$" + d.cost : "";

      return `
        <div class="card ${getColorClass(d)}"
          onclick="openModal('${d.id}','${d.title.replace(/'/g,"")}')">
          <div class="card-title">${d.title}</div>
          <div class="card-meta">${category}${cost ? " • " + cost : ""}</div>
        </div>
      `;
    }).join("");

  } catch {
    document.getElementById("content").innerHTML = "<p>Failed to load decisions.</p>";
  }
}

/* NAV */
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
