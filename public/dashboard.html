<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.create-section {
  margin-top: 40px;
  text-align: center;
}

.create-label {
  font-size: 14px;
  margin-bottom: 8px;
}

.create-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #4338ca;
  color: white;
  font-size: 24px;
  border: none;
  cursor: pointer;
}

.main {
  flex: 1;
  padding: 20px;
  max-width: 800px;
  margin: auto;
  position: relative;
}

.top-link {
  position: absolute;
  top: 20px;
  right: 20px;
  color: #4338ca;
  cursor: pointer;
}

.card {
  border-radius: 12px;
  padding: 16px;
  margin-top: 14px;
  cursor: pointer;
  transition: transform 0.1s ease;
}

.card:hover {
  transform: scale(1.02);
}

.low-use { background: #fde68a; }
.medium-use { background: #bfdbfe; }
.high-use { background: #bbf7d0; }

#createModal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: linear-gradient(135deg, #ffffff, #eef2ff);
  width: 360px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.modal-content h3 {
  margin-top: 0;
  color: #312e81;
}

.modal-content label {
  font-size: 13px;
  margin-top: 10px;
  display: block;
  color: #444;
}

.modal-content input,
.modal-content select {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.modal-content button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.save-btn {
  background: #4338ca;
  color: white;
}

.cancel-btn {
  background: #e5e7eb;
  color: #333;
}
/* 🔴 REMOVE NUMBER INPUT ARROWS */

/* Chrome, Safari, Edge */
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

/* Firefox */
input[type="number"] {
  -moz-appearance: textfield;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>

  <div class="create-section">
    <div class="create-label">New Decision</div>
    <button class="create-btn" onclick="openModal()">+</button>
  </div>
</div>

<div class="main">
  <div class="top-link" onclick="goHow()">How it works</div>
  <h2>Decisions</h2>
  <div id="content">Loading...</div>
</div>

<div id="createModal">
  <div class="modal-content">

    <h3>Create Decision</h3>

    <input id="title" placeholder="Title">
    <input id="cost" type="number" placeholder="Cost">

    <select id="category">
      <option value="">Select Category</option>
      <option value="home_office">Home Office</option>
      <option value="travel">Travel</option>
      <option value="relationship">Relationship</option>
      <option value="job">Job</option>
      <option value="lawn_garden">Lawn and Garden</option>
      <option value="electronics">Electronics</option>
      <option value="home">Home</option>
      <option value="outdoors_patio">Outdoors and Patio</option>
      <option value="vehicle">Vehicle</option>
      <option value="moving">Moving</option>
      <option value="work">Work</option>
      <option value="business">Business</option>
      <option value="tools">Tools</option>
      <option value="clothing">Clothing</option>
      <option value="decor">Decor</option>
      <option value="dining">Dining</option>
      <option value="medical">Medical</option>
      <option value="pets">Pets</option>
      <option value="other">Other</option>
    </select>

    <label>Time Pressure</label>
    <input type="range" id="timePressure" min="1" max="5">

    <label>Emotional Weight</label>
    <input type="range" id="emotionalWeight" min="1" max="5">

    <button class="save-btn" onclick="createDecision()">Save</button>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>

  </div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

/* 🔴 FIX */
function resetForm(){
  document.getElementById("title").value = "";
  document.getElementById("cost").value = "";
  document.getElementById("category").value = "";
  document.getElementById("timePressure").value = 3;
  document.getElementById("emotionalWeight").value = 3;
}

function openModal(){
  resetForm();
  document.getElementById("createModal").style.display = "block";
}

function closeModal(){
  document.getElementById("createModal").style.display = "none";
}

async function createDecision(){
  const title = document.getElementById("title").value;
  const cost = parseFloat(document.getElementById("cost").value);
  const category = document.getElementById("category").value;
  const timePressure = parseInt(document.getElementById("timePressure").value);
  const emotionalWeight = parseInt(document.getElementById("emotionalWeight").value);

  await fetch(API + "/decisions", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify({
      title,
      cost,
      category,
      timePressure,
      emotionalWeight
    })
  });

  resetForm();
  closeModal();
  load();
}

function getUseClass(freq){
  if(freq==="Low") return "low-use";
  if(freq==="Medium") return "medium-use";
  if(freq==="High") return "high-use";
  return "";
}

async function load(){
  const res = await fetch(API + "/decisions", {
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();
  const content = document.getElementById("content");

  content.innerHTML = data.data.map(d => {

    let freq = null;
    if (d.evaluations && d.evaluations.length){
      freq = d.evaluations[d.evaluations.length-1].frequencyOfUse;
    }

    return `
      <div class="card ${getUseClass(freq)}" onclick="goEvaluate('${d.id}')">
        <strong>${d.title}</strong><br>
        ${d.category || ""}
      </div>
    `;

  }).join("");
}

function goEvaluate(id){
  window.location.href = "evaluate.html?id=" + id;
}

function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }
function goHow(){ window.location.href="how-it-works.html"; }

load();

</script>

</body>
</html>
