<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Evaluate Decision</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #eef2ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #d1d5db;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #3730a3;
}

.nav-item:hover { background: #c7d2fe; }
.active { background: #4f46e5; color: white; }

/* MAIN */
.main {
  flex: 1;
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.title {
  font-size: 22px;
  font-weight: bold;
}

.section { margin-top: 30px; }

input[type=range] { width: 100%; }

select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
}

.toggle {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.toggle button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #e5e7eb;
}

.toggle .active {
  background: #4f46e5;
  color: white;
}

.save {
  margin-top: 40px;
  width: 100%;
  padding: 14px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.save:disabled { background: #aaa; }
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Decisions</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">

  <div class="title" id="title">Loading...</div>

  <div class="section">
    <div><strong>Overall Satisfaction (0–10)</strong></div>
    <input type="range" min="0" max="10" value="5" id="slider">
    <div id="sliderValue">5</div>
  </div>

  <div class="section">
    <div><strong>Frequency of Use</strong></div>
    <select id="frequency">
      <option>Low</option>
      <option selected>Medium</option>
      <option>High</option>
    </select>
  </div>

  <div class="section">
    <div><strong>Would you do / buy this again?</strong></div>
    <div class="toggle">
      <button id="yesBtn" class="active" onclick="setAgain(true)">Yes</button>
      <button id="noBtn" onclick="setAgain(false)">No</button>
    </div>
  </div>

  <button class="save" id="saveBtn" onclick="save()">Save Evaluation</button>

</div>

<script>

/* ✅ FIXED BACKEND */
const API = "https://ads-backend-clean.onrender.com/api/v1";

/* 🔧 FIXED AUTH */
function token() {
  return localStorage.getItem("ads_token");
}

const t = token();
if (!t || t === "null" || t === "undefined") {
  window.location.href = "login.html";
  throw new Error("STOP");
}

const params = new URLSearchParams(window.location.search);
const decisionId = params.get("id");

let wouldBuyAgain = true;

/* LOAD */
async function load() {

  if (!decisionId) {
    alert("Missing decision id");
    return;
  }

  const res = await fetch(API + "/decisions", {
    headers: { Authorization: "Bearer " + t }
  });

  const data = await res.json();

  const decision = data.data.find(d => d.id === decisionId);

  if (!decision) {
    alert("Decision not found");
    return;
  }

  document.getElementById("title").innerText = decision.title;
}

/* SLIDER */
const slider = document.getElementById("slider");
const sliderValue = document.getElementById("sliderValue");

slider.oninput = () => {
  sliderValue.innerText = slider.value;
};

/* TOGGLE */
function setAgain(val) {
  wouldBuyAgain = val;
  document.getElementById("yesBtn").classList.toggle("active", val);
  document.getElementById("noBtn").classList.toggle("active", !val);
}

/* SAVE */
async function save() {

  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.innerText = "Saving...";

  const satisfaction = Number(slider.value);
  const regretScore = 10 - satisfaction;
  const frequencyOfUse = document.getElementById("frequency").value;

  try {

    const res = await fetch(API + "/decisions/" + decisionId + "/evaluate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + t
      },
      body: JSON.stringify({
        regretScore,
        frequencyOfUse,
        wouldBuyAgain
      })
    });

    if (!res.ok) throw new Error();

    window.location.href = "dashboard.html";

  } catch {
    alert("Failed to save evaluation");
    btn.disabled = false;
    btn.innerText = "Save Evaluation";
  }
}

/* NAV */
function goDash(){ window.location.href="dashboard.html"; }
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
