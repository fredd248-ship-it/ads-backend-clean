<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings - OutcomeClarity</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 340px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  text-align: center;
}

h1 {
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}

.secondary {
  background: #e5e7eb;
  color: #111;
}

.secondary:hover {
  background: #d1d5db;
}
</style>
</head>

<body>

<div class="card">
  <h1>Settings</h1>
  <p>Your account is active.</p>

  <button onclick="goToDashboard()">Go to Dashboard</button>
  <button class="secondary" onclick="logout()">Logout</button>
</div>

<script>
// 🔒 Protect page
if (!localStorage.getItem("ads_token")) {
  window.location.href = "/onboard.html";
}

// 🔁 Navigation
function goToDashboard() {
  window.location.href = "/dashboard.html";
}

// 🚪 Logout
function logout() {
  localStorage.removeItem("ads_token");
  window.location.href = "/onboard.html";
}
</script>

</body>
</html>
