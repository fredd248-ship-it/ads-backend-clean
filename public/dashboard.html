<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #e0e7ff;
  height: 100vh;
  padding: 20px 10px;
  border-right: 1px solid #c7d2fe;
  display: flex;
  flex-direction: column;
}

.nav-item {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  color: #312e81;
}

.nav-item:hover { background: #c7d2fe; }

.active {
  background: #4338ca;
  color: white;
}

.create-section {
  margin-top: 40px;
  text-align: center;
}

.create-label {
  font-size: 14px;
  margin-bottom: 8px;
  color: #312e81;
}

.create-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #4338ca;
  color: white;
  font-size: 24px;
  border: none;
  cursor: pointer;
}

.main {
  flex: 1;
  padding: 20px;
  max-width: 800px;
  margin: auto;
  position: relative;
}

.top-link {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 14px;
  color: #4338ca;
  cursor: pointer;
}

.card {
  border-radius: 12px;
  padding: 16px;
  margin-top: 14px;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.05);
}

/* ✅ EXACT COLOR SYSTEM */
.low-use {
  background: #fde68a;
}

.medium-use {
  background: #bfdbfe;
}

.high-use {
  background: #bbf7d0;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>

  <div class="create-section">
    <div class="create-label">New Decision</div>
    <button class="create-btn" onclick="openModal()">+</button>
  </div>
</div>

<div class="main">
  <div class="top-link" onclick="goHow()">How it works</div>
  <h2>Decisions</h2>
  <div id="content">Loading...</div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

/* ✅ EXACT MATCH LOGIC */
function getUseClass(freq) {
  if (!freq) return "";

  if (freq === "Low") return "low-use";
  if (freq === "Medium") return "medium-use";
  if (freq === "High") return "high-use";

  return "";
}

/* LOAD */
async function load(){
  const res = await fetch(API + "/decisions", {
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();
  const content = document.getElementById("content");

  content.innerHTML = data.data.map(d => {

    let freq = null;

    if (d.evaluations && d.evaluations.length > 0) {
      const latest = d.evaluations[d.evaluations.length - 1];
      freq = latest.frequencyOfUse;
    }

    const useClass = getUseClass(freq);

    return `
      <div class="card ${useClass}" onclick="goEvaluate('${d.id}')">
        <strong>${d.title}</strong><br>
        ${d.category || ""}
      </div>
    `;

  }).join("");
}

function goEvaluate(id){
  window.location.href = "evaluate.html?id=" + id;
}

function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }
function goHow(){ window.location.href="how-it-works.html"; }

load();

</script>

</body>
</html>
