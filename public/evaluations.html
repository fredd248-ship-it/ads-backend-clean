<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Evaluations</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f5f7fb; display:flex; }

.sidebar {
  width:220px;
  background:#eef2ff;
  height:100vh;
  padding:20px 10px;
  border-right:1px solid #d1d5db;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.nav-item {
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  color:#3730a3;
}

.nav-item:hover { background:#c7d2fe; }
.active { background:#4f46e5; color:white; }

.main {
  flex:1;
  max-width:700px;
  margin:auto;
  padding:20px;
}

/* CARDS */
.card {
  padding:16px;
  margin-top:12px;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* COLORS */
.clay { background:#f1e3d3; }
.good { background:#16a34a; color:white; }
.mid  { background:#2563eb; color:white; }
.bad  { background:#dc2626; color:white; }

.label {
  font-size:12px;
  padding:6px 10px;
  border-radius:8px;
  background:rgba(0,0,0,0.15);
}

/* HISTORY BUTTON */
.history-btn {
  font-size:12px;
  padding:6px 10px;
  border-radius:8px;
  background:white;
  border:none;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item" onclick="goDash()">Decisions</div>
  <div class="nav-item active">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">

  <h2>Evaluations</h2>
  <p>Select a decision to evaluate</p>

  <div id="list">Loading...</div>

</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

if(!token){
  window.location.href = "login.html";
}

/* COLOR + LABEL */
function getEvalState(decision){

  if(!decision.evaluations || decision.evaluations.length === 0){
    return { class:"clay", label:"Not evaluated" };
  }

  const latest = decision.evaluations[decision.evaluations.length - 1];
  const satisfaction = 10 - latest.regretScore;

  if(satisfaction <= 3) return { class:"bad", label:"Poor" };
  if(satisfaction <= 6) return { class:"mid", label:"Mixed" };

  return { class:"good", label:"Good" };
}

/* LOAD */
async function load(){

  try {

    const res = await fetch(API + "/decisions", {
      headers:{ Authorization:"Bearer " + token }
    });

    const data = await res.json();
    const decisions = data.data || [];

    const container = document.getElementById("list");

    if(decisions.length === 0){
      container.innerHTML = "<p>No decisions available</p>";
      return;
    }

    container.innerHTML = decisions.map(d => {

      const state = getEvalState(d);

      return `
        <div class="card ${state.class}">
          
          <div onclick="openEvaluate('${d.id}')">
            <strong>${d.title}</strong><br>
            <small>${d.category || ""}</small>
          </div>

          <div>
            <div class="label">${state.label}</div>
            <button class="history-btn"
              onclick="event.stopPropagation(); openHistory('${d.id}')">
              History
            </button>
          </div>

        </div>
      `;

    }).join("");

  } catch(err){
    document.getElementById("list").innerHTML = "Failed to load decisions";
  }
}

/* NAV */
function openEvaluate(id){
  window.location.href = "evaluate.html?id=" + id;
}

function openHistory(id){
  window.location.href = "evaluation-history.html?id=" + id;
}

function goDash(){ window.location.href="dashboard.html"; }
function goHistory(){ window.location.href="evaluation-history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
