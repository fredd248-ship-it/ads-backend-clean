<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f5f7fb; display:flex; }

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#e0e7ff;
  height:100vh;
  padding:20px 10px;
}

.nav-item {
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

.nav-item:hover { background:#c7d2fe; }
.active { background:#4338ca; color:white; }

/* MAIN */
.main {
  flex:1;
  padding:20px;
  max-width:900px;
  margin:auto;
}

/* TOP BAR */
.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ADD BUTTON */
.add-container {
  display:flex;
  align-items:center;
  gap:10px;
}

.add-btn {
  width:42px;
  height:42px;
  border-radius:50%;
  border:none;
  background:#4338ca;
  color:white;
  font-size:22px;
  cursor:pointer;
}

/* CARDS */
.card {
  border-radius:12px;
  padding:16px;
  margin-top:14px;
  cursor:pointer;
}

.clay { background:#e7d8c9; color:#333; }
.good { background:#16a34a; color:white; }
.mid  { background:#2563eb; color:white; }
.bad  { background:#dc2626; color:white; }

.card-title { font-weight:bold; }
.card-meta { font-size:12px; opacity:.8; }

/* MODALS */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:white;
  width:520px;
  max-width:90%;
  padding:24px;
  border-radius:14px;
}

.modal-content label { display:block; margin-top:16px; }

.modal-content input,
.modal-content select {
  width:100%;
  padding:10px;
  margin-top:8px;
}

button {
  margin-top:16px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
}

.save-btn { background:#4338ca; color:white; }
.cancel-btn { background:#e5e7eb; }

</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item active">Dashboard</div>
  <div class="nav-item" onclick="goEvaluations()">Evaluations</div>
  <div class="nav-item" onclick="goHistory()">History</div>
  <div class="nav-item" onclick="goInsights()">Insights</div>
  <div class="nav-item" onclick="goBehavior()">Behavior</div>
  <div class="nav-item" onclick="goSettings()">Settings</div>
</div>

<div class="main">

  <div class="top-bar">
    <h2>Decisions</h2>

    <div class="add-container">
      <button class="add-btn" onclick="openCreate()" title="Create New Decision">+</button>
      <span style="font-size:14px; color:#555;">Create Decision</span>
    </div>
  </div>

  <div id="content">Loading...</div>

</div>

<!-- CREATE MODAL -->
<div id="createModal" class="modal">
  <div class="modal-content">

    <h3>Create Decision</h3>

    <label>Title</label>
    <input id="newTitle">

    <label>Category</label>
    <select id="newCategory">
      <option>Home Office</option>
      <option>Travel</option>
      <option>Relationship</option>
      <option>Job</option>
      <option>Lawn and Garden</option>
      <option>Electronics</option>
      <option>Home</option>
      <option>Outdoors and Patio</option>
      <option>Vehicle</option>
      <option>Moving</option>
      <option>Work</option>
      <option>Business</option>
      <option>Tools</option>
      <option>Clothing</option>
      <option>Decor</option>
      <option>Dining</option>
      <option>Medical</option>
      <option>Pets</option>
      <option>Other</option>
    </select>

    <label>Cost</label>
    <input id="newCost" type="number">

    <button class="save-btn" onclick="saveDecision()">Save</button>
    <button class="cancel-btn" onclick="closeCreate()">Cancel</button>

  </div>
</div>

<!-- EVALUATION MODAL -->
<div id="evalModal" class="modal">
  <div class="modal-content">

    <h3 id="modalTitle"></h3>

    <label>Satisfaction</label>
    <input type="range" min="0" max="10" value="5" id="slider">

    <label>Frequency</label>
    <select id="frequency">
      <option>Low</option>
      <option selected>Medium</option>
      <option>High</option>
    </select>

    <label>Buy Again</label>
    <select id="again">
      <option value="true">Yes</option>
      <option value="false">No</option>
    </select>

    <button class="save-btn" onclick="saveEval()">Save</button>
    <button class="cancel-btn" onclick="closeEval()">Cancel</button>

  </div>
</div>

<script>

const API = "https://ads-backend-clean.onrender.com/api/v1";
const token = localStorage.getItem("ads_token");

let activeDecisionId = null;

/* COLOR */
function getColorClass(d){
  if(!d.evaluations || d.evaluations.length === 0) return "clay";
  const s = 10 - d.evaluations[d.evaluations.length-1].regretScore;
  if(s <=3) return "bad";
  if(s <=6) return "mid";
  return "good";
}

/* LOAD */
async function load(){
  const res = await fetch(API + "/decisions", {
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();
  const decisions = data.data || [];

  const content = document.getElementById("content");

  if(decisions.length === 0){
    content.innerHTML = "<p>No decisions yet.</p>";
    return;
  }

  content.innerHTML = decisions.map(d => {
    const cat = d.category || "Uncategorized";
    const cost = d.cost ? "$"+d.cost : "";

    return `
      <div class="card ${getColorClass(d)}"
        onclick="openEval('${d.id}','${d.title.replace(/'/g,"")}')">
        <div class="card-title">${d.title}</div>
        <div class="card-meta">${cat}${cost ? " • "+cost : ""}</div>
      </div>
    `;
  }).join("");
}

/* CREATE */
function openCreate(){
  document.getElementById("createModal").style.display = "flex";
}

function closeCreate(){
  document.getElementById("createModal").style.display = "none";
}

async function saveDecision(){
  try {
    const res = await fetch(API + "/decisions", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+token
      },
      body: JSON.stringify({
        title: document.getElementById("newTitle").value,
        category: document.getElementById("newCategory").value,
        cost: Number(document.getElementById("newCost").value || 0)
      })
    });

    const data = await res.json();

    if(!res.ok){
      alert("Create failed: " + (data.error || "Unknown"));
      return;
    }

    closeCreate();
    load();

  } catch(err){
    alert("Create error: " + err.message);
  }
}

/* EVAL */
function openEval(id,title){
  activeDecisionId = id;
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("evalModal").style.display = "flex";
}

function closeEval(){
  document.getElementById("evalModal").style.display = "none";
}

async function saveEval(){
  try {
    const res = await fetch(API + "/decisions/" + activeDecisionId + "/evaluate", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+token
      },
      body: JSON.stringify({
        regretScore: 10 - Number(document.getElementById("slider").value),
        frequencyOfUse: document.getElementById("frequency").value,
        wouldBuyAgain: document.getElementById("again").value === "true"
      })
    });

    const data = await res.json();

    if(!res.ok){
      alert("Save failed: " + (data.error || "Unknown"));
      return;
    }

    closeEval();
    load();

  } catch(err){
    alert("Save error: " + err.message);
  }
}

/* NAV */
function goEvaluations(){ window.location.href="evaluations.html"; }
function goHistory(){ window.location.href="history.html"; }
function goInsights(){ window.location.href="insights.html"; }
function goBehavior(){ window.location.href="behavior.html"; }
function goSettings(){ window.location.href="settings.html"; }

load();

</script>

</body>
</html>
